<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Designer — 배경 제거</title>
    <meta name="description" content="이미지 배경을 제거하고 투명한 배경의 PNG로 다운로드하세요.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .remove-bg-workspace {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
        }

        .preview-box {
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            background: #f0f0f0;
            /* checkered background simulating transparency */
            background-image:
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%),
                linear-gradient(-45deg, #e0e0e0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e0e0e0 75%),
                linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            z-index: 10;
        }

        .preview-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            z-index: 20;
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">✦</span>
                <h1>Logo Designer</h1>
            </div>
            <nav class="nav-links">
                <a href="/" class="nav-link">✨ 이미지 생성</a>
                <a href="/remove-bg.html" class="nav-link active">✂️ 배경 제거</a>
            </nav>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="main">
        <div class="remove-bg-workspace">
            <!-- Upload Section -->
            <section class="section" id="upload-section">
                <div class="section-header">
                    <span class="step-badge">1</span>
                    <h2>이미지 업로드</h2>
                </div>
                <div class="upload-zone" id="bg-upload-zone">
                    <div id="bg-upload-placeholder">
                        <div class="upload-icon">📁</div>
                        <p class="upload-text">이미지를 드래그 앤 드롭하거나 클릭하여 업로드</p>
                        <p class="upload-hint">지원 포맷: JPG, PNG, WebP (오프라인 브라우저 환경에서 즉시 처리됩니다)</p>
                    </div>
                    <input type="file" id="bg-file-input" accept="image/*" hidden />
                </div>
            </section>

            <!-- Results Section -->
            <section class="section" id="result-section" style="display:none;">
                <div class="section-header">
                    <span class="step-badge">2</span>
                    <h2>결과 확인</h2>
                </div>
                <div class="preview-container">
                    <div class="preview-box">
                        <span class="preview-label">원본</span>
                        <img id="img-original" />
                    </div>
                    <div class="preview-box">
                        <span class="preview-label">결과</span>
                        <span id="loading-indicator"
                            style="display:none; flex-direction:column; align-items:center; z-index:15;">
                            <span class="spinner"
                                style="border-width:3px; width:24px; height:24px; border-top-color:var(--text-primary);"></span>
                            <span
                                style="margin-top:10px; font-size:13px; font-weight:500; font-family:'Inter',sans-serif; color:var(--text-primary);">배경
                                제거 중... (첫 실행 시 1~2초 소요)</span>
                        </span>
                        <img id="img-result" style="display:none;" />
                    </div>
                </div>

                <div style="margin-top:20px; display:flex; justify-content:flex-end; gap: 10px;">
                    <button class="btn-generate" id="btn-process-bg" style="width:auto; display:none;">
                        <span class="btn-text">✨ 배경 제거 시작</span>
                    </button>
                    <button class="btn-generate" id="btn-download-bg" style="width:auto; display:none;">
                        <span class="btn-text">📥 투명 PNG 다운로드</span>
                    </button>
                </div>
            </section>
        </div>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <!-- Client-side background removal logic -->
    <script type="module" src="/js/remove-bg.js"></script>
</body>

</html>
